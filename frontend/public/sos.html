<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>1092 Emergency Helpline – SOS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #e53935;
      --red-dark: #b71c1c;
      --bg: #0a0a0f;
      --card: #111118;
      --border: rgba(255,255,255,0.08);
      --text: #f0f0f0;
      --muted: #888;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .logo { font-size: 48px; font-weight: 900; letter-spacing: -2px; margin-bottom: 8px; }
    .logo span { color: var(--red); }
    .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 48px; letter-spacing: 0.5px; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 40px;
      text-align: center;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6);
    }

    #sos-btn {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: none;
      background: radial-gradient(circle at 35% 35%, #ff5252, var(--red-dark));
      color: white;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 1px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 0 0 0 rgba(229,57,53,0.6);
      margin-bottom: 32px;
      position: relative;
      outline: none;
    }
    #sos-btn.pulse {
      animation: sosPulse 1.2s infinite;
    }
    @keyframes sosPulse {
      0%   { box-shadow: 0 0 0 0 rgba(229,57,53,0.7); }
      70%  { box-shadow: 0 0 0 30px rgba(229,57,53,0); }
      100% { box-shadow: 0 0 0 0 rgba(229,57,53,0); }
    }
    #sos-btn:hover { transform: scale(1.05); }
    #sos-btn:active { transform: scale(0.97); }
    #sos-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .status {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
      min-height: 22px;
    }
    .status-sub {
      font-size: 12px;
      color: var(--muted);
      min-height: 18px;
    }

    .bars {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 4px;
      height: 32px;
      margin: 20px auto 0;
    }
    .bar {
      width: 6px;
      border-radius: 3px;
      background: var(--red);
      animation: barPulse 0.8s ease-in-out infinite alternate;
    }
    .bar:nth-child(2) { animation-delay: 0.1s; }
    .bar:nth-child(3) { animation-delay: 0.2s; }
    .bar:nth-child(4) { animation-delay: 0.3s; }
    .bar:nth-child(5) { animation-delay: 0.4s; }
    @keyframes barPulse {
      from { height: 6px; opacity: 0.4; }
      to   { height: 28px; opacity: 1; }
    }
    .bars.hidden { display: none; }

    /* AI talking indicator */
    .ai-speaking {
      display: none;
      background: rgba(229,57,53,0.08);
      border: 1px solid rgba(229,57,53,0.2);
      border-radius: 12px;
      padding: 10px 16px;
      font-size: 13px;
      color: var(--red);
      font-weight: 600;
      margin-top: 16px;
    }

    .footer { margin-top: 32px; font-size: 12px; color: var(--muted); }
    .footer b { color: var(--text); }
  </style>
</head>
<body>
  <div class="logo"><span>1092</span></div>
  <p class="subtitle">EMERGENCY HELPLINE · KARNATAKA</p>

  <div class="card">
    <button id="sos-btn" onclick="startCall()">
      🆘<br/>SOS<br/>CALL
    </button>

    <p class="status" id="status-text">Press SOS to connect</p>
    <p class="status-sub" id="status-sub">Your call will be handled by AI and escalated to a human if needed.</p>

    <div class="bars hidden" id="audio-bars">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>

    <div class="ai-speaking" id="ai-speaking">🔊 AI is responding...</div>
  </div>

  <div class="footer">
    Calls are recorded for safety. | Government of Karnataka | <b>Free of charge</b>
  </div>

  <script>
    const WS_URL = (location.protocol === 'https:' ? 'wss' : 'ws') +
                   '://' + (window.BACKEND_URL || 'localhost:3000');

    let ws = null;
    let mediaRecorder = null;
    let callId = null;
    let audioCtx = null;
    let callActive = false;

    function uuid() {
      return 'WEB-' + Math.random().toString(36).substr(2, 9).toUpperCase();
    }

    function setStatus(main, sub = '') {
      document.getElementById('status-text').textContent = main;
      document.getElementById('status-sub').textContent = sub;
    }

    async function startCall() {
      const btn = document.getElementById('sos-btn');
      if (callActive) { endCall(); return; }

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        callId = uuid();
        callActive = true;

        btn.textContent = '🔴\nEnd\nCall';
        btn.classList.add('pulse');
        document.getElementById('audio-bars').classList.remove('hidden');
        setStatus('Connecting to helpline...', 'Please wait...');

        // Connect WebSocket
        ws = new WebSocket(`${WS_URL}/citizen/${callId}`);

        ws.onopen = () => {
          setStatus('🟢 Connected – AI is listening', 'Speak clearly about your emergency.');

          // Stream audio chunks to server
          mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
          mediaRecorder.ondataavailable = async (e) => {
            if (e.data.size > 0 && ws.readyState === WebSocket.OPEN) {
              const buf = await e.data.arrayBuffer();
              const b64 = btoa(String.fromCharCode(...new Uint8Array(buf)));
              ws.send(JSON.stringify({ type: 'audio_chunk', data: b64 }));
            }
          };
          mediaRecorder.start(2000); // Send every 2 seconds
        };

        ws.onmessage = (event) => {
          const msg = JSON.parse(event.data);

          if (msg.type === 'ai_audio' && msg.data) {
            // Play AI response audio
            playBase64Audio(msg.data);
            document.getElementById('ai-speaking').style.display = 'block';
            setTimeout(() => document.getElementById('ai-speaking').style.display = 'none', 3000);
          } else if (msg.type === 'agent_audio' && msg.data) {
            // Play human agent audio
            playBase64Audio(msg.data);
            setStatus('👤 Human agent is speaking', 'A specialist has joined your call.');
          } else if (msg.type === 'pong') {
            // keep-alive ok
          }
        };

        ws.onclose = () => {
          setStatus('Call ended', 'Thank you for calling 1092.');
          endCall(false);
        };

        ws.onerror = () => {
          setStatus('Connection error', 'Please try again.');
          endCall(false);
        };

      } catch (err) {
        setStatus('Microphone access denied', 'Please allow microphone and try again.');
        console.error(err);
      }
    }

    function endCall(closeWs = true) {
      callActive = false;
      const btn = document.getElementById('sos-btn');
      btn.classList.remove('pulse');
      btn.innerHTML = '🆘<br/>SOS<br/>CALL';
      document.getElementById('audio-bars').classList.add('hidden');
      document.getElementById('ai-speaking').style.display = 'none';

      if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
      if (closeWs && ws) ws.close();
      ws = null; mediaRecorder = null;
    }

    async function playBase64Audio(b64) {
      if (!audioCtx) audioCtx = new AudioContext();
      const binary = atob(b64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      const decoded = await audioCtx.decodeAudioData(bytes.buffer);
      const src = audioCtx.createBufferSource();
      src.buffer = decoded;
      src.connect(audioCtx.destination);
      src.start();
    }

    // Heartbeat
    setInterval(() => {
      if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'ping' }));
    }, 25000);
  </script>
</body>
</html>
